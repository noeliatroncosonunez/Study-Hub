<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="study Hub.css">
    <title>Contacto</title>
</head>
<body>
    
    <section class="contacto" id="contacto">

    <h2 class="titulo">📞 Contáctanos</h2>

    <p class="subtitulo">
        Estamos disponibles para responder tus consultas, sugerencias y comentarios.
    </p>

    <div class="contenedor-contacto">

        <div class="card">
            <h3>📧 Correo Electrónico</h3>
            <p>contacto.studyhub@gmail.com</p>
        </div>

        <div class="card">
            <h3>📱 Instagram</h3>
            <a href="https://www.instagram.com/web.studyhub.3b" target="_blank">
                @web.studyhub.3b
            </a>
        </div>

        <div class="card">
            <h3>🎵 TikTok</h3>
            <p>Próximamente</p>
        </div>

        <div class="card">
            <h3>📞 Teléfono</h3>
            <p>+56 9 2345 6789</p>
        </div>

    </div>

    <div class="formulario">

        <h3>✉️ Envíanos un mensaje</h3>

        <form>

            <input type="text" placeholder="Nombre completo" required>

            <input type="email" placeholder="Correo electrónico" required>

            <textarea rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

            <button type="submit">Enviar Mensaje</button>

        </form>

    </div>

    <div class="volver">
        <button onclick="window.location.href='studyhub.html'">
            ⬅ Volver al Inicio
        </button>
    </div>

</section>

<a href="study Hub.html"></a>

<script src="study Hub.js"></script>

</body>
</html>
